<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terraaly - Login</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="script.js"></script>
</head>
<body>
  <div class="login-container">
    <div class="left-panel">
      <div class="content">
        <h1>Welcome to Terraaly</h1>
        <p>Connecting You with the Future of Farming</p>
      </div>
    </div>
    <div class="right-panel">
      <h2>Login</h2>
      <form action="login.php" method="POST" id="login-form">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn-login">Login</button>
        <div class="social-login">
          <p>Or login with</p>
          <button type="button" class="btn-social google" onclick="socialLogin('google')">Google</button>
          <button type="button" class="btn-social facebook" onclick="socialLogin('facebook')">Facebook</button>
        </div>
        <p class="signup-link">
          Don't have an account? <a href="signup.php">Sign Up</a>
        </p>
      </form>
    </div>
  </div>

  <style>
    /* General Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    .login-container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* Left Panel */
    .left-panel {
      flex: 1;
      background: linear-gradient(to bottom, #8fcf81, #a7d795);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .left-panel::before {
      content: '';
      background-image:url('./images/Farm.jpg') ;
      /* background:('C:\xampp\htdocs\Terraaly\images\Farm.jpg') no-repeat center center / cover; */
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.5;
    }

    .left-panel .content {
      position: relative;
      text-align: center;
      color: rgb(14, 13, 13);
    }

    .left-panel h1 {
      font-size: 2.5rem;
      font-weight: bold;
    }

    .left-panel p {
      font-size: 1.2rem;
      margin-top: 1rem;
    }

    /* Right Panel */
    .right-panel {
      flex: 1;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      box-shadow: -5px 0 15px rgba(0, 0, 0, 0.1);
    }

    .right-panel h2 {
      margin-bottom: 1.5rem;
      font-size: 2rem;
      color: #4a7c59;
    }

    .input-group {
      margin-bottom: 1rem;
      width: 100%;
    }

    .input-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .input-group input {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
    }

    .btn-login {
      background: #4a7c59;
      color: white;
      padding: 0.8rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 1rem;
      width: 100%;
    }

    .btn-login:hover {
      background: #3a6247;
    }

    .social-login {
      text-align: center;
      margin-top: 1.5rem;
    }

    .btn-social {
      background: #e2e2e2;
      color: #555;
      border: none;
      padding: 0.8rem 1rem;
      margin: 0.5rem;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn-social.google {
      background: #db4437;
      color: white;
    }

    .btn-social.facebook {
      background: #4267b2;
      color: white;
    }

    .signup-link {
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .signup-link a {
      color: #4a7c59;
      text-decoration: none;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>

  <script>
    function socialLogin(platform) {
      alert(`Login with ${platform} is not implemented yet.`);
    }

    document.getElementById('login-form').addEventListener('submit', function (e) {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        e.preventDefault();
        alert('Please fill in all fields.');
      }
    });
  </script>
</body>
</html>
